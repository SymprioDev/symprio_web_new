server {
    listen 80;
    server_name isai-alai.live www.isai-alai.live;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name isai-alai.live www.isai-alai.live;

    ssl_certificate /etc/letsencrypt/live/isai-alai.live/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/isai-alai.live/privkey.pem;

    root /var/www/symprio/dist;
    index index.html;

    # API proxy to backend
    location /api/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Uploaded files
    location /uploads/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Frontend SPA
    location / {
        try_files $uri $uri/ /index.html;
    }
}
