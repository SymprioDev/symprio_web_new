name: Deploy to Hetzner

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to server
        run: |
          rsync -avz --delete \
            --exclude 'node_modules/' \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude '.env' \
            --exclude 'uploads/' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            ./ ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/var/www/symprio

      - name: Install dependencies and restart services
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
          export PATH=$PATH:/usr/local/bin:/root/.nvm/versions/node/*/bin
          cd /var/www/symprio
          npm install --production
          sudo cp nginx.conf /etc/nginx/sites-available/isai-alai.live
          sudo ln -sf /etc/nginx/sites-available/isai-alai.live /etc/nginx/sites-enabled/isai-alai.live
          sudo nginx -t && sudo systemctl reload nginx
          pm2 restart symprio-backend || pm2 start ecosystem.config.cjs --only symprio-backend
          EOF
